
services:
  backend:
    build: ./backend/app
    container_name: jarvis-backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: always
  
  frontend:
    build: ./frontend
    container_name: jarvis-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

volumes:
  ollama_data: